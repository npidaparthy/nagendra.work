  <text x="14" y="44" font-family="Inter,Arial,sans-serif" font-weight="900" font-size="34" fill="white">N</text>
  <text x="28" y="44" font-family="Inter,Arial,sans-serif" font-weight="900" font-size="34" fill="#a5b4fc">P</text>
</svg>
